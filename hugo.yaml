# Hugo configuration file
title: FDMBOOK

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: About
      pageRef: about.md
      weight: 1
    - name: Typo
      pageRef: typo.md
      weight: 2
    - name: Codes
      pageRef: codes.md
      weight: 3
    - name: Contact ↗
      url: "https://github.com/tktmyd"
      weight: 5
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 6
      url: "https://github.com/OpenSWPC/fdmbook"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
